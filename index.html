<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />

    <!-- Preconnect to external domains for better performance -->
    <link rel="preconnect" href="https://www.googletagmanager.com" crossorigin />
    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />

    <!-- Favicons (early in head so tab icon shows immediately) -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="48x48 32x32 16x16" />
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" sizes="any" />

    <!-- PRIMARY META - UPDATE THESE FOR EACH TOOL -->
    <title>TOOL_TITLE | Free Online Tool by Codama</title>
    <meta name="description" content="TOOL_DESCRIPTION. 100% free, no signup required. Works in your browser." />
    <meta name="keywords" content="TOOL_KEYWORDS" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://TOOL_SUBDOMAIN.codama.dev/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="TOOL_TITLE | Free Online Tool by Codama" />
    <meta property="og:description" content="TOOL_DESCRIPTION. 100% free, no signup required." />
    <meta property="og:url" content="https://TOOL_SUBDOMAIN.codama.dev/" />
    <meta property="og:site_name" content="TOOL_TITLE" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TOOL_TITLE | Free Online Tool by Codama" />
    <meta name="twitter:description" content="TOOL_DESCRIPTION. 100% free, no signup required." />

    <!-- JSON-LD structured data - UPDATE FOR EACH TOOL -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "TOOL_TITLE",
        "description": "TOOL_DESCRIPTION",
        "url": "https://TOOL_SUBDOMAIN.codama.dev/",
        "applicationCategory": "UtilitiesApplication",
        "operatingSystem": "Any",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "featureList": [
          "TOOL_FEATURE_1",
          "TOOL_FEATURE_2",
          "No registration, no limits, works in browser"
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
